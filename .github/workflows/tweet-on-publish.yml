name: Tweet on Blog Publish

on:
  push:
    branches: [main]
    paths:
      - 'content/posts/**.md'

permissions:
  contents: write

jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Detect new blog posts
        id: detect
        run: |
          NEW_POSTS=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'content/posts/*.md')
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$NEW_POSTS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          if [ -z "$NEW_POSTS" ]; then
            echo "has_new=false" >> $GITHUB_OUTPUT
          else
            echo "has_new=true" >> $GITHUB_OUTPUT
          fi

      - name: Tweet new posts
        if: steps.detect.outputs.has_new == 'true'
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        run: |
          echo "${{ steps.detect.outputs.files }}" | while IFS= read -r file; do
            if [ -n "$file" ]; then
              echo "Tweeting for: $file"
              node scripts/tweet-on-publish.js "$file"
            fi
          done

      - name: Commit tweet log
        if: steps.detect.outputs.has_new == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jesse/Projects/drafts/tweet-log.json
          git diff --cached --quiet || git commit -m "chore: update tweet log" && git push
